<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Desk</title>
</head>

<body>

<h2>Track Desk - Test</h2>

<button onclick="saveOrder()">Save Order</button>
<button onclick="loadOrders()">Load Orders</button>

<pre id="output"></pre>

<!-- ✅ SUPABASE SCRIPT (ONLY ONCE) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* ✅ CONNECT SUPABASE */
const db = window.supabase.createClient(
  "https://plutgdrzlggecxnbjqxy.supabase.co",
  "sb_publishable_4w3UYv9lEFTxTztCgIQIUw_q-9JruF4"
);

/* ✅ SAVE ORDER */
async function saveOrder() {
  const { error } = await db
    .from('orders')
    .insert([
      {
        customer_name: "Misab",
        product: "Dog Hoodie",
        cod_amount: 799,
        status: "New"
      }
    ]);

  if (error) {
    console.log(error);
    alert("Error saving");
  } else {
    alert("Saved successfully!");
  }
}

/* ✅ LOAD ORDERS */
async function loadOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*');

  if (error) {
    console.log(error);
    alert("Error loading");
  } else {
    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);
  }
}
</script>

</body>
</html>
