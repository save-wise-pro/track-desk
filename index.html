<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Desk</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }
    h2 {
      color: #333;
    }
    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: black;
      color: white;
      cursor: pointer;
    }
    button:hover {
      opacity: 0.8;
    }
    pre {
      background: white;
      padding: 10px;
      margin-top: 15px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>📦 Track Desk (Live + Supabase)</h2>

<button onclick="saveOrder()">Save Order</button>
<button onclick="loadOrders()">Load Orders</button>

<pre id="output">Data will appear here...</pre>

<!-- ✅ SUPABASE (ONLY ONE TIME) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
/* 🔌 CONNECT SUPABASE */
const db = window.supabase.createClient(
  "https://plutgdrzlggecxnbjqxy.supabase.co",
  "sb_publishable_4w3UYv9lEFTxTztCgIQIUw_q-9JruF4"
);

/* 💾 SAVE ORDER */
async function saveOrder() {
  const { error } = await db
    .from('orders')
    .insert([
      {
        customer_name: "Misab",
        product: "Dog Hoodie",
        cod_amount: 799,
        status: "New"
      }
    ]);

  if (error) {
    console.error(error);
    alert("❌ Error saving");
  } else {
    alert("✅ Saved successfully!");
  }
}

/* 📥 LOAD ORDERS */
async function loadOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*');

  if (error) {
    console.error(error);
    alert("❌ Error loading");
  } else {
    document.getElementById("output").innerText =
      JSON.stringify(data, null, 2);
  }
}
</script>

</body>
</html>
